services:
  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: ./services/catalog-service
    ports:
      - "8000:8000"
    environment:
      CATALOG_DATABASE_URL: postgresql://catalog:catalog@catalog-db:5432/catalog_db
    depends_on:
      catalog-db:
        condition: service_healthy

volumes:
  catalog_db_data:
